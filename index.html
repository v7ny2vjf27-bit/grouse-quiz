<main><div class="grid"><section><div class="card" id="topCard"><h2>学習設定</h2><div class="form-row"><div><label for="fieldSelect">分野</label><select id="fieldSelect"></select></div><div><label for="subfieldSelect">サブ分野</label><select id="subfieldSelect"></select></div></div><div class="form-row"><div><label for="modeSelect">出題モード</label><select id="modeSelect"><option value="all">全形式ランダム</option><option value="multiple">4択クイズ</option><option value="truefalse">○×クイズ</option><option value="fill">穴埋めクイズ</option><option value="flashcard">暗記カードモード</option></select></div><div><label for="rankSelect">重要ランク</label><select id="rankSelect"><option value="all">全ランク</option><option value="A">Aランク</option><option value="B">Bランク</option><option value="C">Cランク</option></select></div></div><div class="search-box"><label for="keywordInput">キーワード検索</label><input id="keywordInput" type="text" placeholder="例：取消訴訟、時効、国会、個人情報" /></div><div class="toggle-row"><label class="check-pill"><input type="checkbox" id="excludeMasteredCheck" />習得済みを除外</label></div><div class="btn-row"><button class="btn-primary" id="startBtn">この条件で開始</button><button class="btn-accent" id="weakStartBtn">苦手問題だけ出題</button><button class="btn-light" id="showWeakBtn">苦手問題リスト表示</button></div><p class="small-note">学習データはブラウザ内のlocalStorageに保存されます。全1000問。</p></div><div class="card hidden" id="quizCard"><h2>クイズ</h2><div class="progress-text" id="progressText">0 / 0</div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div class="quiz-header" id="quizHeader"></div><div class="question" id="questionText"></div><div class="choices" id="choicesArea"></div><div class="hidden" id="fillArea"><label for="fillInput">解答を入力</label><input type="text" id="fillInput" placeholder="答えを入力してください" /><div class="btn-row"><button class="btn-primary" id="submitFillBtn">解答する</button></div></div><div class="hidden" id="cardArea"><button class="btn-light" id="showAnswerBtn">答えを見る</button><div class="result-box result iv class="stat-box"><div class="stat-label">習得済み問題数</div><div class="stat-value" id="masteredCount">0</div></div><div class="stat-box"><div class="stat-label">総問題数</div><div class="stat-value" id="questionCount">0</div></div></div><div class="btn-row"><button class="btn-danger" id="resetBtn">全データリセット</button></div></div><div class="card"><h2>苦手問題リスト</h2><div id="weakList" class="weak-list"></div></div></aside></div></main>

const STORAGE_KEY="gyosei_quiz_progress_complete_v1";const DEFAULT_PROGRESS={totalAttempts:0,totalCorrect:0,todayDate:"",todayAttempts:0,perQuestion:{}};let progress=loadProgress();let session={pool:[],index:0,total:0,correct:0,answered:false,flashcardMode:false,weakOnly:false};const $=id=>document.getElementById(id);const fieldSelect=$("fieldSelect"),subfieldSelect=$("subfieldSelect"),modeSelect=$("modeSelect"),rankSelect=$("rankSelect"),keywordInput=$("keywordInput"),excludeMasteredCheck=$("excludeMasteredCheck"),startBtn=$("startBtn"),weakStartBtn=$("weakStartBtn"),showWeakBtn=$("showWeakBtn"),resetBtn=$("resetBtn"),topCard=$("topCard"),quizCard=$("quizCard"),finishCard=$("finishCard"),progressText=$("progressText"),progressFill=$("progressFill"),quizHeader=$("quizHeader"),questionText=$("questionText"),choicesArea=$("choicesArea"),fillArea=$("fillArea"),fillInput=$("fillInput"),submitFillBtn=$("submitFillBtn"),cardArea=$("cardArea"),showAnswerBtn=$("showAnswerBtn"),cardAnswerBox=$("cardAnswerBox"),cardAnswerText=$("cardAnswerText"),cardExplanationText=$("cardExplanationText"),cardMemoryText=$("cardMemoryText"),cardTrapText=$("cardTrapText"),cardJudgeBtns=$("cardJudgeBtns"),cardCorrectBtn=$("cardCorrectBtn"),cardWrongBtn=$("cardWrongBtn"),resultBox=$("resultBox"),resultText=$("resultText"),explanationText=$("explanationText"),memoryText=$("memoryText"),trapText=$("trapText"),nextBtn=$("nextBtn"),finishBtn=$("finishBtn"),todayCount=$("todayCount"),totalCount=$("totalCount"),totalRate=$("totalRate"),learnedCount=$("learnedCount"),weakCount=$("weakCount"),masteredCount=$("masteredCount"),questionCount=$("questionCount"),weakList=$("weakList"),sessionTotal=$("sessionTotal"),sessionCorrect=$("sessionCorrect"),sessionRate=$("sessionRate"),backTopBtn=$("backTopBtn"),retryWeakBtn=$("retryWeakBtn");
startBtn.addEventListener("click",()=>startQuiz(false));weakStartBtn.addEventListener("click",()=>startQuiz(true));showWeakBtn.addEventListener("click",renderWeakList);resetBtn.addEventListener("click",resetAllData);submitFillBtn.addEventListener("click",submitFillAnswer);fillInput.addEventListener("keydown",e=>{if(e.key==="Enter")submitFillAnswer()});showAnswerBtn.addEventListener("click",showCardAnswer);cardCorrectBtn.addEventListener("click",()=>judgeAnswer(true,"card"));cardWrongBtn.addEventListener("click",()=>judgeAnswer(false,"card"));nextBtn.addEventListener("click",nextQuestion);finishBtn.addEventListener("click",finishQuiz);backTopBtn.addEventListener("click",backToTop);retryWeakBtn.addEventListener("click",()=>startQuiz(true));fieldSelect.addEventListener("change",populateSubfields);initialize();
function initialize(){if(!Array.isArray(QUESTIONS)||QUESTIONS.length===0){alert("問題データが読み込まれていません。JSファイルを確認してください。");return}ensureToday();QUESTIONS.forEach(q=>ensureQuestionProgress(q.id));populateFields();populateSubfields();saveProgress();updateStats();renderWeakList()}function populateFields(){const fields=["all",...new Set(QUESTIONS.map(q=>q.field))];fieldSelect.innerHTML=fields.map(f=>`<option value="${escapeHtml(f)}">${escapeHtml(f==="all"?"全分野":f)}</option>`).join("")}function populateSubfields(){const f=fieldSelect.value;let items=QUESTIONS;if(f!=="all")items=QUESTIONS.filter(q=>q.field===f);const subs=["all",...new Set(items.map(q=>q.subfield||"未分類"))];subfieldSelect.innerHTML=subs.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s==="all"?"全サブ分野":s)}</option>`).join("")}function loadProgress(){try{const saved=localStorage.getItem(STORAGE_KEY);if(!saved)return JSON.parse(JSON.stringify(DEFAULT_PROGRESS));const parsed=JSON.parse(saved);return {...JSON.parse(JSON.stringify(DEFAULT_PROGRESS)),...parsed,perQuestion:parsed.perQuestion||{}}}catch{return JSON.parse(JSON.stringify(DEFAULT_PROGRESS))}}function saveProgress(){localStorage.setItem(STORAGE_KEY,JSON.stringify(progress))}function getTodayKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}function ensureToday(){const t=getTodayKey();if(progress.todayDate!==t){progress.todayDate=t;progress.todayAttempts=0}}function ensureQuestionProgress(id){if(!progress.perQuestion[id])progress.perQuestion[id]={attempts:0,correct:0,wrong:0,streak:0,mastered:false,weak:false,lastAnswered:""}}
function startQuiz(weakOnly){ensureToday();const f=fieldSelect.value,s=subfieldSelect.value,m=modeSelect.value,r=rankSelect.value,kw=normalizeText(keywordInput.value),ex=excludeMasteredCheck.checked;let pool=QUESTIONS.filter(q=>{ensureQuestionProgress(q.id);const p=progress.perQuestion[q.id];const text=normalizeText([q.question,q.answer,q.explanation,q.subfield,q.article,q.memoryTip,q.trap].join(" "));return(f==="all"||q.field===f)&&(s==="all"||(q.subfield||"未分類")===s)&&(m==="all"||m==="flashcard"||q.type===m)&&(r==="all"||q.rank===r)&&(!kw||text.includes(kw))&&(!ex||!p.mastered)&&(!weakOnly||p.weak)});if(pool.length===0){alert("この条件に合う問題がありません。条件を変更してください。");return}pool=shuffleArray(pool);session={pool,index:0,total:0,correct:0,answered:false,flashcardMode:m==="flashcard",weakOnly};topCard.classList.add("hidden");finishCard.classList.add("hidden");quizCard.classList.remove("hidden");renderQuestion()}function renderQuestion(){const q=getCurrentQuestion();if(!q){finishQuiz();return}session.answered=false;resetQuestionUI();const p=progress.perQuestion[q.id];progressText.textContent=`${session.index+1} / ${session.pool.length}`;progressFill.style.width=`${(session.index/session.pool.length)*100}%`;quizHeader.innerHTML=`<span class="badge badge-field">${escapeHtml(q.field)}</span><span class="badge badge-type">${escapeHtml(q.subfield||"未分類")}</span><span class="badge badge-type">${escapeHtml(q.article||"")}</span><span class="badge badge-type">${getTypeLabel(session.flashcardMode?"flashcard":q.type)}</span><span class="badge ${getImportanceClass(q.importance)}">重要度：${escapeHtml(q.importance)}</span><span class="badge badge-type">ランク：${escapeHtml(q.rank||"-")}</span>${p.weak?'<span class="badge badge-weak">苦手</span>':""}${p.mastered?'<span class="badge badge-mastered">習得済み</span>':""}<span class="badge badge-type">連続正解：${p.streak}回</span>`;questionText.textContent=q.question;if(session.flashcardMode||q.type==="card")renderFlashcard();else if(q.type==="multiple"||q.type==="truefalse")renderChoices(q);else renderFill()}function resetQuestionUI(){choicesArea.innerHTML="";fillArea.classList.add("hidden");cardArea.classList.add("hidden");fillInput.value="";resultBox.className="result-box";resultText.textContent="";explanationText.textContent="";memoryText.textContent="";trapText.textContent="";nextBtn.classList.add("hidden");cardAnswerBox.classList.remove("show");cardAnswerText.textContent="";cardExplanationText.textContent="";cardMemoryText.textContent="";cardTrapText.textContent="";cardJudgeBtns.classList.add("hidden");showAnswerBtn.disabled=false;submitFillBtn.disabled=false;cardCorrectBtn.disabled=false;cardWrongBtn.disabled=false}function renderChoices(q){(q.choices||[]).forEach(choice=>{const b=document.createElement("button");b.className="choice-btn";b.textContent=choice;b.addEventListener("click",()=>{if(session.answered)return;judgeAnswer(choice===q.answer,"choice",choice)});choicesArea.appendChild(b)})}function renderFill(){fillArea.classList.remove("hidden");setTimeout(()=>fillInput.focus(),50)}function renderFlashcard(){cardArea.classList.remove("hidden")}function submitFillAnswer(){if(session.answered)return;const q=getCurrentQuestion(),ua=normalizeAnswer(fillInput.value),ca=normalizeAnswer(q.answer);if(!ua){alert("解答を入力してください。");return}judgeAnswer(ua===ca,"fill",fillInput.value)}function showCardAnswer(){const q=getCurrentQuestion();cardAnswerText.textContent=q.answer;cardExplanationText.textContent=q.explanation||"";cardMemoryText.textContent=q.memoryTip?`記憶のコツ：${q.memoryTip}`:"";cardTrapText.textContent=q.trap?`ひっかけ注意：${q.trap}`:"";cardAnswerBox.classList.add("show");cardJudgeBtns.classList.remove("hidden");showAnswerBtn.disabled=true}
function judgeAnswer(ok,source,selected=""){if(session.answered)return;const q=getCurrentQuestion();session.answered=true;session.total++;if(ok)session.correct++;recordAnswer(q.id,ok);updateStats();renderWeakList();if(source==="choice")markChoiceButtons(q,selected);if(source==="fill")submitFillBtn.disabled=true;if(source==="card"){cardCorrectBtn.disabled=true;cardWrongBtn.disabled=true}showResult(q,ok,source);nextBtn.classList.remove("hidden");progressFill.style.width=`${((session.index+1)/session.pool.length)*100}%`}function recordAnswer(id,ok){ensureToday();ensureQuestionProgress(id);const p=progress.perQuestion[id];p.attempts++;progress.totalAttempts++;progress.todayAttempts++;if(ok){p.correct++;p.streak++;progress.totalCorrect++;if(p.streak>=3){p.mastered=true;p.weak=false}}else{p.wrong++;p.streak=0;p.mastered=false;p.weak=true}p.lastAnswered=new Date().toISOString();saveProgress()}function showResult(q,ok,source){resultBox.classList.add("show");if(source==="card"){resultBox.classList.add("result-card");resultText.innerHTML=ok?"<strong>記録：</strong>覚えていたとして保存しました。":"<strong>記録：</strong>苦手問題として保存しました。"}else if(ok){resultBox.classList.add("result-correct");resultText.innerHTML="<strong>正解です。</strong>"}else{resultBox.classList.add("result-wrong");resultText.innerHTML=`<strong>不正解です。</strong><br>正解：${escapeHtml(q.answer)}`}explanationText.textContent=q.explanation||"";memoryText.textContent=q.memoryTip?`記憶のコツ：${q.memoryTip}`:"";trapText.textContent=q.trap?`ひっかけ注意：${q.trap}`:""}function markChoiceButtons(q,selected){choicesArea.querySelectorAll(".choice-btn").forEach(b=>{b.disabled=true;if(b.textContent===q.answer)b.classList.add("correct");if(b.textContent===selected&&selected!==q.answer)b.classList.add("wrong")})}function nextQuestion(){session.index++;if(session.index>=session.pool.length)finishQuiz();else renderQuestion()}function finishQuiz(){quizCard.classList.add("hidden");finishCard.classList.remove("hidden");topCard.classList.add("hidden");const rate=session.total===0?0:Math.round(session.correct/session.total*100);sessionTotal.textContent=session.total;sessionCorrect.textContent=session.correct;sessionRate.textContent=`${rate}%`;updateStats();renderWeakList()}function backToTop(){finishCard.classList.add("hidden");quizCard.classList.add("hidden");topCard.classList.remove("hidden");progressFill.style.width="0%"}function getCurrentQuestion(){return session.pool[session.index]}function updateStats(){ensureToday();let learned=0,weak=0,mastered=0;QUESTIONS.forEach(q=>{ensureQuestionProgress(q.id);const p=progress.perQuestion[q.id];if(p.attempts>0)learned++;if(p.weak)weak++;if(p.mastered)mastered++});const rate=progress.totalAttempts===0?0:Math.round(progress.totalCorrect/progress.totalAttempts*100);todayCount.textContent=progress.todayAttempts;totalCount.textContent=progress.totalAttempts;totalRate.textContent=`${rate}%`;learnedCount.textContent=learned;weakCount.textContent=weak;masteredCount.textContent=mastered;questionCount.textContent=QUESTIONS.length;saveProgress()}function renderWeakList(){const arr=QUESTIONS.filter(q=>{ensureQuestionProgress(q.id);return progress.perQuestion[q.id].weak});weakList.innerHTML="";if(arr.length===0){weakList.innerHTML='<div class="empty">現在、苦手問題はありません。</div>';return}arr.forEach(q=>{const p=progress.perQuestion[q.id],d=document.createElement("div");d.className="weak-item";d.innerHTML=`<div class="weak-title">${escapeHtml(q.question)}</div><div class="weak-meta">${escapeHtml(q.field)} ／ ${escapeHtml(q.subfield||"未分類")} ／ ${getTypeLabel(q.type)} ／ ランク${escapeHtml(q.rank||"-")} ／ 誤答${p.wrong}回 ／ 連続正解${p.streak}回</div>`;weakList.appendChild(d)})}function resetAllData(){if(!confirm("すべての学習記録をリセットします。よろしいですか？"))return;localStorage.removeItem(STORAGE_KEY);progress=loadProgress();initialize();topCard.classList.remove("hidden");quizCard.classList.add("hidden");finishCard.classList.add("hidden");alert("学習データをリセットしました。")}
function shuffleArray(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}function normalizeAnswer(v){return String(v).trim().replace(/\s+/g,"").replace(/[Ａ-Ｚａ-ｚ０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0)).toLowerCase()}function normalizeText(v){return normalizeAnswer(v).replace(/[。、・「」『』（）()\-ー]/g,"")}function getTypeLabel(t){return{multiple:"4択",truefalse:"○×",fill:"穴埋め",card:"暗記カード",flashcard:"暗記カード"}[t]||t}function getImportanceClass(i){if(i==="高")return"badge-high";if(i==="中")return"badge-mid";return"badge-low"}function escapeHtml(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#039;")}
</script>

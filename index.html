<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行政書士 暗記クイズアプリ</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --primary: #1e3a5f;
      --primary-light: #e8f0f8;
      --accent: #0f766e;
      --danger: #b91c1c;
      --danger-light: #fee2e2;
      --success: #166534;
      --success-light: #dcfce7;
      --warning: #92400e;
      --warning-light: #fef3c7;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Yu Gothic", "Yu Gothic UI", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    header {
      background: linear-gradient(135deg, #1e3a5f, #0f766e);
      color: #fff;
      padding: 22px 18px;
      box-shadow: var(--shadow);
    }

    header .header-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2rem);
      letter-spacing: 0.03em;
    }

    .subtitle {
      margin: 6px 0 0;
      opacity: 0.92;
      font-size: 0.95rem;
    }

    main {
      max-width: 1100px;
      margin: 22px auto;
      padding: 0 16px 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .card + .card {
      margin-top: 18px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.12rem;
      color: var(--primary);
      border-left: 5px solid var(--accent);
      padding-left: 10px;
    }

    h3 {
      margin: 12px 0 8px;
      font-size: 1rem;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      color: #374151;
    }

    select,
    input[type="text"] {
      width: 100%;
      padding: 13px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      font-size: 1rem;
      outline: none;
    }

    select:focus,
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 14px;
    }

    .check-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 700;
      color: #374151;
      cursor: pointer;
      user-select: none;
    }

    .check-pill input {
      transform: scale(1.15);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: 0.15s ease;
      min-height: 48px;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-accent {
      background: var(--accent);
      color: #fff;
    }

    .btn-light {
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid #cbd5e1;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-ghost {
      background: #fff;
      color: #374151;
      border: 1px solid var(--line);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-box {
      border: 1px solid #e5e7eb;
      background: #fafafa;
      border-radius: 14px;
      padding: 12px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .stat-value {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1.3;
    }

    .quiz-header {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.8rem;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .badge-field {
      background: var(--primary-light);
      color: var(--primary);
      border-color: #cbd5e1;
    }

    .badge-type {
      background: #f3f4f6;
      color: #374151;
      border-color: #e5e7eb;
    }

    .badge-high {
      background: var(--danger-light);
      color: var(--danger);
      border-color: #fecaca;
    }

    .badge-mid {
      background: var(--warning-light);
      color: var(--warning);
      border-color: #fde68a;
    }

    .badge-low {
      background: var(--success-light);
      color: var(--success);
      border-color: #bbf7d0;
    }

    .badge-mastered {
      background: var(--success-light);
      color: var(--success);
      border-color: #bbf7d0;
    }

    .badge-weak {
      background: var(--danger-light);
      color: var(--danger);
      border-color: #fecaca;
    }

    .question {
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      font-weight: 900;
      margin: 14px 0;
      color: #111827;
    }

    .choices {
      display: grid;
      gap: 10px;
      margin: 16px 0;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1px solid var(--line);
      color: #1f2937;
      font-weight: 800;
      padding: 14px;
    }

    .choice-btn:hover {
      background: #f9fafb;
    }

    .choice-btn.correct {
      background: var(--success-light);
      border-color: #86efac;
      color: var(--success);
    }

    .choice-btn.wrong {
      background: var(--danger-light);
      border-color: #fecaca;
      color: var(--danger);
    }

    .answer-area {
      margin-top: 14px;
    }

    .result-box {
      display: none;
      border-radius: 14px;
      padding: 14px;
      margin-top: 16px;
      border: 1px solid #e5e7eb;
    }

    .result-box.show {
      display: block;
    }

    .result-correct {
      background: var(--success-light);
      border-color: #86efac;
      color: var(--success);
    }

    .result-wrong {
      background: var(--danger-light);
      border-color: #fecaca;
      color: var(--danger);
    }

    .result-card {
      background: var(--primary-light);
      border-color: #cbd5e1;
      color: var(--primary);
    }

    .explanation {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgba(0, 0, 0, 0.18);
      color: #374151;
      font-weight: 600;
    }

    .progress-text {
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 0.25s ease;
    }

    .weak-list {
      display: grid;
      gap: 10px;
      max-height: 420px;
      overflow: auto;
      padding-right: 4px;
    }

    .weak-item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 11px;
      background: #fafafa;
    }

    .weak-title {
      font-weight: 900;
      margin-bottom: 4px;
    }

    .weak-meta {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .empty {
      color: var(--muted);
      background: #fafafa;
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      font-weight: 700;
    }

    .small-note {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 8px 0 0;
    }

    .hidden {
      display: none !important;
    }

    .finish-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 12px 0;
    }

    .summary-box {
      background: #fafafa;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }

    .summary-number {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--primary);
    }

    .summary-label {
      color: var(--muted);
      font-weight: 800;
      font-size: 0.82rem;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .stats,
      .finish-summary {
        grid-template-columns: repeat(2, 1fr);
      }

      button {
        width: 100%;
      }

      .btn-row {
        display: grid;
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 420px) {
      main {
        padding: 0 10px 32px;
      }

      .card {
        padding: 14px;
      }

      .stats,
      .finish-summary {
        grid-template-columns: 1fr;
      }

      header {
        padding: 18px 14px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <h1>行政書士 暗記クイズアプリ</h1>
      <p class="subtitle">重要知識を反復し、苦手を潰し、3回連続正解で「習得済み」へ。暗記は気合ではなく、設計です。</p>
    </div>
  </header>

  <main>
    <div class="grid">
      <section>
        <div class="card" id="topCard">
          <h2>学習設定</h2>

          <div class="form-row">
            <div>
              <label for="fieldSelect">分野</label>
              <select id="fieldSelect">
                <option value="all">全分野からランダム</option>
                <option value="行政法">行政法</option>
                <option value="民法">民法</option>
                <option value="憲法">憲法</option>
                <option value="商法・会社法">商法・会社法</option>
                <option value="基礎法学">基礎法学</option>
                <option value="一般知識">一般知識</option>
                <option value="記述式対策">記述式対策</option>
                <option value="その他">その他</option>
              </select>
            </div>

            <div>
              <label for="modeSelect">出題モード</label>
              <select id="modeSelect">
                <option value="all">全形式ランダム</option>
                <option value="multiple">4択クイズ</option>
                <option value="truefalse">○×クイズ</option>
                <option value="fill">穴埋めクイズ</option>
                <option value="flashcard">暗記カードモード</option>
              </select>
            </div>
          </div>

          <div class="toggle-row">
            <label class="check-pill">
              <input type="checkbox" id="excludeMasteredCheck" />
              習得済みを除外
            </label>
          </div>

          <div class="btn-row">
            <button class="btn-primary" id="startBtn">この条件で開始</button>
            <button class="btn-accent" id="weakStartBtn">苦手問題だけ出題</button>
            <button class="btn-light" id="showWeakBtn">苦手問題リスト表示</button>
          </div>

          <p class="small-note">
            ※問題データはJavaScript内の <strong>QUESTIONS</strong> 配列に追加できます。
          </p>
        </div>

        <div class="card hidden" id="quizCard">
          <h2>クイズ</h2>

          <div class="progress-text" id="progressText">0 / 0</div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>

          <div class="quiz-header" id="quizHeader"></div>

          <div class="question" id="questionText"></div>

          <div class="choices" id="choicesArea"></div>

          <div class="answer-area hidden" id="fillArea">
            <label for="fillInput">解答を入力</label>
            <input type="text" id="fillInput" placeholder="答えを入力してください" />
            <div class="btn-row">
              <button class="btn-primary" id="submitFillBtn">解答する</button>
            </div>
          </div>

          <div class="answer-area hidden" id="cardArea">
            <button class="btn-light" id="showAnswerBtn">答えを見る</button>
            <div class="result-box result-card" id="cardAnswerBox">
              <strong>答え</strong>
              <div id="cardAnswerText"></div>
              <div class="explanation" id="cardExplanationText"></div>
            </div>
            <div class="btn-row hidden" id="cardJudgeBtns">
              <button class="btn-accent" id="cardCorrectBtn">覚えていた</button>
              <button class="btn-danger" id="cardWrongBtn">覚えていなかった</button>
            </div>
          </div>

          <div class="result-box" id="resultBox">
            <div id="resultText"></div>
            <div class="explanation" id="explanationText"></div>
          </div>

          <div class="btn-row">
            <button class="btn-primary hidden" id="nextBtn">次の問題へ</button>
            <button class="btn-ghost" id="finishBtn">終了する</button>
          </div>
        </div>

        <div class="card hidden" id="finishCard">
          <h2>学習結果</h2>
          <div class="finish-summary">
            <div class="summary-box">
              <div class="summary-number" id="sessionTotal">0</div>
              <div class="summary-label">今回の解答数</div>
            </div>
            <div class="summary-box">
              <div class="summary-number" id="sessionCorrect">0</div>
              <div class="summary-label">今回の正解数</div>
            </div>
            <div class="summary-box">
              <div class="summary-number" id="sessionRate">0%</div>
              <div class="summary-label">今回の正答率</div>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn-primary" id="backTopBtn">トップへ戻る</button>
            <button class="btn-accent" id="retryWeakBtn">苦手問題を復習する</button>
          </div>
        </div>
      </section>

      <aside>
        <div class="card">
          <h2>学習記録</h2>
          <div class="stats">
            <div class="stat-box">
              <div class="stat-label">今日の学習問題数</div>
              <div class="stat-value" id="todayCount">0</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">総学習問題数</div>
              <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">総正答率</div>
              <div class="stat-value" id="totalRate">0%</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">学習済み問題数</div>
              <div class="stat-value" id="learnedCount">0</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">苦手問題数</div>
              <div class="stat-value" id="weakCount">0</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">習得済み問題数</div>
              <div class="stat-value" id="masteredCount">0</div>
            </div>
          </div>

          <div class="btn-row">
            <button class="btn-danger" id="resetBtn">全データリセット</button>
          </div>
        </div>

        <div class="card" id="weakListCard">
          <h2>苦手問題リスト</h2>
          <div id="weakList" class="weak-list"></div>
        </div>
      </aside>
    </div>

    <p class="footer-note">
      学習データはこのブラウザのlocalStorageに保存されます。別端末・別ブラウザには引き継がれません。
    </p>
  </main>

  <script>
    /*
      =========================================================
      問題データ
      =========================================================

      後から問題を追加する場合は、下の QUESTIONS 配列に
      同じ形式のオブジェクトを追加してください。

      type:
      - "multiple"  : 4択
      - "truefalse" : ○×
      - "fill"      : 穴埋め
      - "card"      : 暗記カード用

      importance:
      - "高"
      - "中"
      - "低"
    */

    const QUESTIONS = [
      {
        id: 1,
        field: "行政法",
        type: "multiple",
        importance: "高",
        question: "行政手続法において、申請に対する処分の審査基準は、原則としてどのように扱われるか。",
        choices: [
          "必ず非公開とされる",
          "原則として公にしておかなければならない",
          "行政庁の裁量で常に省略できる",
          "口頭でのみ示せば足りる"
        ],
        answer: "原則として公にしておかなければならない",
        explanation: "審査基準とは、行政庁が申請により求められた許認可等を判断するための基準であり、行政手続法上、原則として公にしておく必要がある。"
      },
      {
        id: 2,
        field: "行政法",
        type: "truefalse",
        importance: "高",
        question: "行政手続法における不利益処分とは、行政庁が法令に基づき、特定の者を名あて人として、直接に義務を課し、または権利を制限する処分をいう。",
        choices: ["○", "×"],
        answer: "○",
        explanation: "不利益処分は、特定の者を名あて人として、直接に義務を課し、または権利を制限する処分である。定義問題として頻出。"
      },
      {
        id: 3,
        field: "行政法",
        type: "fill",
        importance: "中",
        question: "行政不服審査法において、行政庁の処分に不服がある者が行う代表的な不服申立てを何というか。空欄を埋めよ。「＿＿請求」",
        choices: [],
        answer: "審査",
        explanation: "行政不服審査法では、処分等に不服がある場合の中心的な手段は審査請求である。"
      },
      {
        id: 4,
        field: "行政法",
        type: "multiple",
        importance: "高",
        question: "行政事件訴訟法において、取消訴訟の対象となる代表的なものはどれか。",
        choices: [
          "行政庁の処分または裁決",
          "私人間の売買契約",
          "国会議員の政治的発言",
          "単なる行政内部のメモ"
        ],
        answer: "行政庁の処分または裁決",
        explanation: "取消訴訟は、行政庁の処分その他公権力の行使に当たる行為、または裁決の取消しを求める訴訟である。"
      },
      {
        id: 5,
        field: "行政法",
        type: "card",
        importance: "高",
        question: "行政行為の公定力とは何か。",
        choices: [],
        answer: "行政行為に違法があっても、権限ある機関により取り消されるまでは、一応有効なものとして扱われる効力。",
        explanation: "行政行為の効力に関する基本概念。取消訴訟や行政上の法律関係の理解に直結する。"
      },

      {
        id: 6,
        field: "民法",
        type: "multiple",
        importance: "高",
        question: "民法において、制限行為能力者に該当しないものはどれか。",
        choices: [
          "未成年者",
          "成年被後見人",
          "被保佐人",
          "破産者"
        ],
        answer: "破産者",
        explanation: "制限行為能力者は、未成年者、成年被後見人、被保佐人、被補助人である。破産者は制限行為能力者ではない。"
      },
      {
        id: 7,
        field: "民法",
        type: "truefalse",
        importance: "高",
        question: "錯誤による意思表示は、一定の要件を満たす場合、取り消すことができる。",
        choices: ["○", "×"],
        answer: "○",
        explanation: "錯誤は、一定の要件のもとで取消しの対象となる。無効ではなく取消しである点に注意。"
      },
      {
        id: 8,
        field: "民法",
        type: "fill",
        importance: "中",
        question: "代理人が本人のためにすることを示して意思表示をすることを、代理における何というか。空欄を埋めよ。「＿＿」",
        choices: [],
        answer: "顕名",
        explanation: "代理では、代理人が本人のためにすることを示す必要があり、これを顕名という。"
      },
      {
        id: 9,
        field: "民法",
        type: "multiple",
        importance: "高",
        question: "時効の完成によって利益を受ける者が、その利益を受ける意思を表示することを何というか。",
        choices: [
          "時効の更新",
          "時効の援用",
          "時効の停止",
          "時効の放棄"
        ],
        answer: "時効の援用",
        explanation: "時効の利益を受けるには、原則として時効の援用が必要である。用語を正確に押さえること。"
      },
      {
        id: 10,
        field: "民法",
        type: "card",
        importance: "中",
        question: "無権代理とは何か。",
        choices: [],
        answer: "代理権がない者が、他人の代理人として法律行為をすること。",
        explanation: "無権代理は、本人に効果が帰属するか、追認・相手方保護などが問題となる重要論点である。"
      },

      {
        id: 11,
        field: "憲法",
        type: "multiple",
        importance: "高",
        question: "日本国憲法において、国民主権・基本的人権の尊重・平和主義は一般に何と呼ばれるか。",
        choices: [
          "憲法の三大原理",
          "行政法の三大原則",
          "民法の基本原則",
          "司法権の三要素"
        ],
        answer: "憲法の三大原理",
        explanation: "日本国憲法の基本原理として、国民主権、基本的人権の尊重、平和主義が挙げられる。"
      },
      {
        id: 12,
        field: "憲法",
        type: "truefalse",
        importance: "高",
        question: "憲法上、思想及び良心の自由は、これを侵してはならないとされている。",
        choices: ["○", "×"],
        answer: "○",
        explanation: "思想及び良心の自由は憲法19条で保障される。内心の自由として非常に強く保障される。"
      },
      {
        id: 13,
        field: "憲法",
        type: "fill",
        importance: "中",
        question: "憲法41条は、国会を国権の最高機関であって、国の唯一の何機関と定めているか。空欄を埋めよ。「＿＿機関」",
        choices: [],
        answer: "立法",
        explanation: "憲法41条は、国会を国権の最高機関であり、国の唯一の立法機関と定めている。"
      },
      {
        id: 14,
        field: "憲法",
        type: "multiple",
        importance: "高",
        question: "違憲審査権について、正しいものはどれか。",
        choices: [
          "裁判所が法令等の憲法適合性を判断する権限である",
          "内閣だけが持つ権限である",
          "地方公共団体だけが持つ権限である",
          "国民投票でのみ行使される権限である"
        ],
        answer: "裁判所が法令等の憲法適合性を判断する権限である",
        explanation: "違憲審査権は、裁判所が具体的事件を通じて法令等が憲法に適合するかを判断する権限である。"
      },
      {
        id: 15,
        field: "憲法",
        type: "card",
        importance: "中",
        question: "公共の福祉とは何か。",
        choices: [],
        answer: "人権相互の衝突を調整するための実質的公平の原理として理解される概念。",
        explanation: "公共の福祉は、人権制約の場面で問われる重要概念。単なる公益優先ではなく、人権相互の調整として理解する。"
      }
    ];

    const STORAGE_KEY = "gyosei_quiz_progress_v1";

    const DEFAULT_PROGRESS = {
      totalAttempts: 0,
      totalCorrect: 0,
      todayDate: "",
      todayAttempts: 0,
      perQuestion: {}
    };

    let progress = loadProgress();

    let session = {
      pool: [],
      index: 0,
      total: 0,
      correct: 0,
      answered: false,
      flashcardMode: false,
      weakOnly: false
    };

    const fieldSelect = document.getElementById("fieldSelect");
    const modeSelect = document.getElementById("modeSelect");
    const excludeMasteredCheck = document.getElementById("excludeMasteredCheck");

    const startBtn = document.getElementById("startBtn");
    const weakStartBtn = document.getElementById("weakStartBtn");
    const showWeakBtn = document.getElementById("showWeakBtn");
    const resetBtn = document.getElementById("resetBtn");

    const topCard = document.getElementById("topCard");
    const quizCard = document.getElementById("quizCard");
    const finishCard = document.getElementById("finishCard");

    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const quizHeader = document.getElementById("quizHeader");
    const questionText = document.getElementById("questionText");
    const choicesArea = document.getElementById("choicesArea");

    const fillArea = document.getElementById("fillArea");
    const fillInput = document.getElementById("fillInput");
    const submitFillBtn = document.getElementById("submitFillBtn");

    const cardArea = document.getElementById("cardArea");
    const showAnswerBtn = document.getElementById("showAnswerBtn");
    const cardAnswerBox = document.getElementById("cardAnswerBox");
    const cardAnswerText = document.getElementById("cardAnswerText");
    const cardExplanationText = document.getElementById("cardExplanationText");
    const cardJudgeBtns = document.getElementById("cardJudgeBtns");
    const cardCorrectBtn = document.getElementById("cardCorrectBtn");
    const cardWrongBtn = document.getElementById("cardWrongBtn");

    const resultBox = document.getElementById("resultBox");
    const resultText = document.getElementById("resultText");
    const explanationText = document.getElementById("explanationText");
    const nextBtn = document.getElementById("nextBtn");
    const finishBtn = document.getElementById("finishBtn");

    const todayCount = document.getElementById("todayCount");
    const totalCount = document.getElementById("totalCount");
    const totalRate = document.getElementById("totalRate");
    const learnedCount = document.getElementById("learnedCount");
    const weakCount = document.getElementById("weakCount");
    const masteredCount = document.getElementById("masteredCount");
    const weakList = document.getElementById("weakList");

    const sessionTotal = document.getElementById("sessionTotal");
    const sessionCorrect = document.getElementById("sessionCorrect");
    const sessionRate = document.getElementById("sessionRate");

    const backTopBtn = document.getElementById("backTopBtn");
    const retryWeakBtn = document.getElementById("retryWeakBtn");

    startBtn.addEventListener("click", () => startQuiz(false));
    weakStartBtn.addEventListener("click", () => startQuiz(true));
    showWeakBtn.addEventListener("click", renderWeakList);
    resetBtn.addEventListener("click", resetAllData);

    submitFillBtn.addEventListener("click", submitFillAnswer);
    fillInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        submitFillAnswer();
      }
    });

    showAnswerBtn.addEventListener("click", showCardAnswer);
    cardCorrectBtn.addEventListener("click", () => judgeAnswer(true, "card"));
    cardWrongBtn.addEventListener("click", () => judgeAnswer(false, "card"));

    nextBtn.addEventListener("click", nextQuestion);
    finishBtn.addEventListener("click", finishQuiz);

    backTopBtn.addEventListener("click", backToTop);
    retryWeakBtn.addEventListener("click", () => startQuiz(true));

    initialize();

    function initialize() {
      ensureToday();
      QUESTIONS.forEach(q => ensureQuestionProgress(q.id));
      saveProgress();
      updateStats();
      renderWeakList();
    }

    function loadProgress() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) {
          return structuredCloneSafe(DEFAULT_PROGRESS);
        }
        const parsed = JSON.parse(saved);
        return {
          ...structuredCloneSafe(DEFAULT_PROGRESS),
          ...parsed,
          perQuestion: parsed.perQuestion || {}
        };
      } catch (error) {
        console.warn("学習データの読み込みに失敗しました。初期化します。", error);
        return structuredCloneSafe(DEFAULT_PROGRESS);
      }
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }

    function structuredCloneSafe(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function getTodayKey() {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function ensureToday() {
      const today = getTodayKey();
      if (progress.todayDate !== today) {
        progress.todayDate = today;
        progress.todayAttempts = 0;
      }
    }

    function ensureQuestionProgress(id) {
      if (!progress.perQuestion[id]) {
        progress.perQuestion[id] = {
          attempts: 0,
          correct: 0,
          wrong: 0,
          streak: 0,
          mastered: false,
          weak: false,
          lastAnswered: ""
        };
      }
    }

    function startQuiz(weakOnly) {
      ensureToday();

      const selectedField = fieldSelect.value;
      const selectedMode = modeSelect.value;
      const excludeMastered = excludeMasteredCheck.checked;

      let pool = QUESTIONS.filter(q => {
        ensureQuestionProgress(q.id);
        const qp = progress.perQuestion[q.id];

        const fieldOk = selectedField === "all" || q.field === selectedField;
        const modeOk =
          selectedMode === "all" ||
          selectedMode === "flashcard" ||
          q.type === selectedMode;

        const masteredOk = !excludeMastered || !qp.mastered;
        const weakOk = !weakOnly || qp.weak;

        return fieldOk && modeOk && masteredOk && weakOk;
      });

      if (pool.length === 0) {
        alert(weakOnly
          ? "この条件に合う苦手問題がありません。条件を変えるか、通常出題を行ってください。"
          : "この条件に合う問題がありません。分野・出題モード・習得済み除外の設定を確認してください。"
        );
        return;
      }

      pool = shuffleArray(pool);

      session = {
        pool,
        index: 0,
        total: 0,
        correct: 0,
        answered: false,
        flashcardMode: selectedMode === "flashcard",
        weakOnly
      };

      topCard.classList.add("hidden");
      finishCard.classList.add("hidden");
      quizCard.classList.remove("hidden");

      renderQuestion();
    }

    function renderQuestion() {
      const q = getCurrentQuestion();
      if (!q) {
        finishQuiz();
        return;
      }

      session.answered = false;

      resetQuestionUI();

      const qp = progress.perQuestion[q.id];

      progressText.textContent = `${session.index + 1} / ${session.pool.length}`;
      const percent = ((session.index) / session.pool.length) * 100;
      progressFill.style.width = `${percent}%`;

      quizHeader.innerHTML = `
        <span class="badge badge-field">${escapeHtml(q.field)}</span>
        <span class="badge badge-type">${getTypeLabel(session.flashcardMode ? "flashcard" : q.type)}</span>
        <span class="badge ${getImportanceClass(q.importance)}">重要度：${escapeHtml(q.importance)}</span>
        ${qp.weak ? '<span class="badge badge-weak">苦手</span>' : ''}
        ${qp.mastered ? '<span class="badge badge-mastered">習得済み</span>' : ''}
        <span class="badge badge-type">連続正解：${qp.streak}回</span>
      `;

      questionText.textContent = q.question;

      if (session.flashcardMode || q.type === "card") {
        renderFlashcard(q);
      } else if (q.type === "multiple" || q.type === "truefalse") {
        renderChoices(q);
      } else if (q.type === "fill") {
        renderFill(q);
      }
    }

    function resetQuestionUI() {
      choicesArea.innerHTML = "";
      fillArea.classList.add("hidden");
      cardArea.classList.add("hidden");

      fillInput.value = "";

      resultBox.className = "result-box";
      resultText.textContent = "";
      explanationText.textContent = "";

      nextBtn.classList.add("hidden");

      cardAnswerBox.classList.remove("show");
      cardAnswerText.textContent = "";
      cardExplanationText.textContent = "";
      cardJudgeBtns.classList.add("hidden");

      showAnswerBtn.disabled = false;
      submitFillBtn.disabled = false;
    }

    function renderChoices(q) {
      q.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice;
        btn.addEventListener("click", () => {
          if (session.answered) return;

          const isCorrect = choice === q.answer;
          judgeAnswer(isCorrect, "choice", choice);
        });
        choicesArea.appendChild(btn);
      });
    }

    function renderFill(q) {
      fillArea.classList.remove("hidden");
      setTimeout(() => fillInput.focus(), 50);
    }

    function renderFlashcard(q) {
      cardArea.classList.remove("hidden");
    }

    function submitFillAnswer() {
      if (session.answered) return;

      const q = getCurrentQuestion();
      const userAnswer = normalizeAnswer(fillInput.value);
      const correctAnswer = normalizeAnswer(q.answer);

      if (!userAnswer) {
        alert("解答を入力してください。");
        return;
      }

      const isCorrect = userAnswer === correctAnswer;
      judgeAnswer(isCorrect, "fill", fillInput.value);
    }

    function showCardAnswer() {
      const q = getCurrentQuestion();

      cardAnswerText.textContent = q.answer;
      cardExplanationText.textContent = q.explanation;
      cardAnswerBox.classList.add("show");
      cardJudgeBtns.classList.remove("hidden");
      showAnswerBtn.disabled = true;
    }

    function judgeAnswer(isCorrect, source, selectedAnswer = "") {
      if (session.answered) return;

      const q = getCurrentQuestion();
      session.answered = true;
      session.total += 1;
      if (isCorrect) {
        session.correct += 1;
      }

      recordAnswer(q.id, isCorrect);
      updateStats();
      renderWeakList();

      if (source === "choice") {
        markChoiceButtons(q, selectedAnswer);
      }

      if (source === "fill") {
        submitFillBtn.disabled = true;
      }

      if (source === "card") {
        cardCorrectBtn.disabled = true;
        cardWrongBtn.disabled = true;
      }

      showResult(q, isCorrect, source);
      nextBtn.classList.remove("hidden");

      progressFill.style.width = `${((session.index + 1) / session.pool.length) * 100}%`;
    }

    function recordAnswer(questionId, isCorrect) {
      ensureToday();
      ensureQuestionProgress(questionId);

      const qp = progress.perQuestion[questionId];

      qp.attempts += 1;
      progress.totalAttempts += 1;
      progress.todayAttempts += 1;

      if (isCorrect) {
        qp.correct += 1;
        qp.streak += 1;
        progress.totalCorrect += 1;

        if (qp.streak >= 3) {
          qp.mastered = true;
          qp.weak = false;
        }
      } else {
        qp.wrong += 1;
        qp.streak = 0;
        qp.mastered = false;
        qp.weak = true;
      }

      qp.lastAnswered = new Date().toISOString();

      saveProgress();
    }

    function showResult(q, isCorrect, source) {
      resultBox.classList.add("show");

      if (source === "card") {
        resultBox.classList.add("result-card");
        resultText.innerHTML = isCorrect
          ? "<strong>記録：</strong>覚えていたとして保存しました。"
          : "<strong>記録：</strong>苦手問題として保存しました。";
      } else if (isCorrect) {
        resultBox.classList.add("result-correct");
        resultText.innerHTML = "<strong>正解です。</strong>";
      } else {
        resultBox.classList.add("result-wrong");
        resultText.innerHTML = `<strong>不正解です。</strong><br>正解：${escapeHtml(q.answer)}`;
      }

      explanationText.textContent = q.explanation;
    }

    function markChoiceButtons(q, selectedAnswer) {
      const buttons = choicesArea.querySelectorAll(".choice-btn");

      buttons.forEach(btn => {
        btn.disabled = true;

        if (btn.textContent === q.answer) {
          btn.classList.add("correct");
        }

        if (btn.textContent === selectedAnswer && selectedAnswer !== q.answer) {
          btn.classList.add("wrong");
        }
      });
    }

    function nextQuestion() {
      session.index += 1;

      cardCorrectBtn.disabled = false;
      cardWrongBtn.disabled = false;

      if (session.index >= session.pool.length) {
        finishQuiz();
      } else {
        renderQuestion();
      }
    }

    function finishQuiz() {
      quizCard.classList.add("hidden");
      finishCard.classList.remove("hidden");
      topCard.classList.add("hidden");

      const rate = session.total === 0 ? 0 : Math.round((session.correct / session.total) * 100);

      sessionTotal.textContent = session.total;
      sessionCorrect.textContent = session.correct;
      sessionRate.textContent = `${rate}%`;

      updateStats();
      renderWeakList();
    }

    function backToTop() {
      finishCard.classList.add("hidden");
      quizCard.classList.add("hidden");
      topCard.classList.remove("hidden");

      progressFill.style.width = "0%";
    }

    function getCurrentQuestion() {
      return session.pool[session.index];
    }

    function updateStats() {
      ensureToday();

      let learned = 0;
      let weak = 0;
      let mastered = 0;

      QUESTIONS.forEach(q => {
        ensureQuestionProgress(q.id);
        const qp = progress.perQuestion[q.id];

        if (qp.attempts > 0) learned += 1;
        if (qp.weak) weak += 1;
        if (qp.mastered) mastered += 1;
      });

      const rate = progress.totalAttempts === 0
        ? 0
        : Math.round((progress.totalCorrect / progress.totalAttempts) * 100);

      todayCount.textContent = progress.todayAttempts;
      totalCount.textContent = progress.totalAttempts;
      totalRate.textContent = `${rate}%`;
      learnedCount.textContent = learned;
      weakCount.textContent = weak;
      masteredCount.textContent = mastered;

      saveProgress();
    }

    function renderWeakList() {
      const weakQuestions = QUESTIONS.filter(q => {
        ensureQuestionProgress(q.id);
        return progress.perQuestion[q.id].weak;
      });

      weakList.innerHTML = "";

      if (weakQuestions.length === 0) {
        weakList.innerHTML = `<div class="empty">現在、苦手問題はありません。</div>`;
        return;
      }

      weakQuestions.forEach(q => {
        const qp = progress.perQuestion[q.id];

        const div = document.createElement("div");
        div.className = "weak-item";
        div.innerHTML = `
          <div class="weak-title">${escapeHtml(q.question)}</div>
          <div class="weak-meta">
            分野：${escapeHtml(q.field)} ／
            形式：${getTypeLabel(q.type)} ／
            重要度：${escapeHtml(q.importance)} ／
            誤答：${qp.wrong}回 ／
            連続正解：${qp.streak}回
          </div>
        `;
        weakList.appendChild(div);
      });
    }

    function resetAllData() {
      const ok = confirm("すべての学習記録をリセットします。よろしいですか？");
      if (!ok) return;

      localStorage.removeItem(STORAGE_KEY);
      progress = loadProgress();
      initialize();

      topCard.classList.remove("hidden");
      quizCard.classList.add("hidden");
      finishCard.classList.add("hidden");

      alert("学習データをリセットしました。");
    }

    function shuffleArray(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function normalizeAnswer(value) {
      return String(value)
        .trim()
        .replace(/\s+/g, "")
        .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
        .toLowerCase();
    }

    function getTypeLabel(type) {
      const labels = {
        multiple: "4択",
        truefalse: "○×",
        fill: "穴埋め",
        card: "暗記カード",
        flashcard: "暗記カード"
      };
      return labels[type] || type;
    }

    function getImportanceClass(importance) {
      if (importance === "高") return "badge-high";
      if (importance === "中") return "badge-mid";
      return "badge-low";
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
